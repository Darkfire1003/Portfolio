<!doctype html>
<html lang="en">
	<head>
		<title>Mike Seins</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link href="output.css" rel="stylesheet" />
		<link href="hamburgers.css" rel="stylesheet" />
	</head>
	<body class="bg-gray-300">
		<main class="max-w-6xl mx-auto m-5">
			<!-- 
// =======================
//     Namens Liste
// ======================= 
-->
			<section class="p-5">
				<div
					class="bg-gray-200 flex flex-col text-center border-5 mt-10 p-10 rounded-2xl">
					<div class="flex flex-col items-center text-center">
						<h1 class="mt-10 font-bold text-2xl pb-5">! Namens Liste !</h1>
					</div>
					<div
						class="grid grid-cols-1 md:grid-cols-2 gap-3 w-fit mx-auto justify-items-center">
						<input
							class="border-2 text-center py-1 rounded-xl justify-items-center"
							type="text"
							placeholder="Vorname"
							id="nameInput" />

						<input
							class="border-2 text-center py-1 rounded-xl justify-items-center"
							type="text"
							placeholder="Alter"
							id="ageInput" />

						<button
							onclick="addPerson()"
							class="border-2 rounded-xl py-1 px-3 max-w-26 bg-green-500"
							type="button">
							Hinzufügen
						</button>

						<button
							onclick="deletePerson()"
							class="border-2 rounded-xl py-1 px-4 max-w-26 bg-red-500"
							type="button">
							Entfernen
						</button>
					</div>
					<ul id="addList" class="mt-8 space-y-2 max-w-md mx-auto"></ul>
				</div>
			</section>
			<!-- 
// =======================
//     BMI Rechner
// ======================= 
-->
			<section class="p-5">
				<div
					class="bg-gray-200 flex flex-col text-center border-5 mt-10 p-10 rounded-2xl">
					<div class="flex flex-col items-center text-center">
						<h1 class="mt-10 font-bold text-2xl pb-5">! BMI Rechner !</h1>

						<div class="pb-5">
							<p>Deine Größe</p>
							<div class="mb-5">
								<input
									type="number"
									class="border-2 text-center gap-5"
									placeholder="in cm"
									id="inputGroesse" />
							</div>
							<p>Dein Gewicht</p>
							<div class="mb-5">
								<input
									type="number"
									class="border-2 text-center"
									placeholder="in kg"
									id="inputGewicht" />
							</div>
							<button
								type="button"
								class="cursor-pointer mt-5 border-2 font-bold w-fit px-3 rounded-lg border-black bg-blue-400 text-white"
								onclick="bmiRechner()">
								Jetzt Auswerten
							</button>
						</div>
						<p
							class="font-bold text-xl p-5 rounded-3xl max-w-2xl"
							id="ergebnis"></p>
					</div>
					<div class="text-left mt-5">
						<p class="font-bold text-xs" id="historie"></p>
					</div>
				</div>
			</section>

			<!-- 
// =======================
//     TO DO Liste
// ======================= 
-->
			<section class="p-5">
				<div
					class="bg-gray-200 flex flex-col text-center border-5 p-5 pb-10 rounded-2xl">
					<h1 class="mt-10 font-bold text-2xl pb-5">! TO-DO !</h1>
					<div class="text-xl box-border">
						<ul id="listItems"></ul>

						<input
							type="text"
							class="border-2 text-center mt-2"
							placeholder="Was fehlt?"
							id="inputList" />
						<button
							type="button"
							onclick="addTo()"
							class="cursor-pointer mt-5 border-2 font-bold w-fit px-3 rounded-lg border-black bg-blue-400 text-white">
							Hinzufügen
						</button>
					</div>
					<p id="errorMsg" class="text-red-500 mt-2"></p>
				</div>
			</section>
			<!-- 
// =======================
//     Türsteher APP
// ======================= 
-->
			<section class="flex-col justify-center items-center text-center p-5">
				<div
					class="flex flex-col items-center bg-gray-200 border-5 mt-10 p-10 rounded-2xl">
					<div class="flex flex-col gap-4">
						<h1>Türsteher App</h1>
						<div class="">
							<input
								class="border-2 p-1"
								id="age"
								type="number"
								placeholder="Gebe dein Alter ein" />
							<input
								class="border-2 p-1"
								id="firstName"
								type="text"
								placeholder="Gebe dein Vorname ein" />
						</div>
						<div>
							<button
								type="button"
								onclick="check()"
								class="cursor-pointer border-2 font-bold w-24 rounded-lg border-black bg-blue-400 text-white">
								Check
							</button>
							<button
								class="cursor-pointer font-bold border-2 w-24 rounded-lg border-black bg-blue-400 text-white"
								type="button"
								onclick="location.reload()">
								Neu laden
							</button>
						</div>
					</div>
					<p class="pt-10 font-bold text-xl" id="output"></p>
				</div>
			</section>
			<!-- 
// =======================
//     Light/Dark mode
// ======================= 
-->
			<section class="p-5">
				<div
					class="bg-gray-200 p-10 flex flex-col text-center border-5 mt-10 rounded-2xl">
					<h1 class="mt-10">Hallo Welt !!!</h1>

					<!-- 🎯 Container für die 4 Buttons -->
					<div
						class="flex flex-col lg:flex-row lg:gap-12 lg:justify-center py-16 px-10">
						<!-- LIGHT/DARK Spalte -->
						<div class="flex flex-col gap-10 mb-8 lg:mb-0">
							<button
								type="button"
								onclick="light()"
								class="font-bold border-2 rounded-full w-fit px-16 mx-auto">
								LIGHT
							</button>
							<button
								type="button"
								onclick="dark()"
								class="font-bold border-2 rounded-full w-fit px-16 mx-auto">
								DARK
							</button>
						</div>

						<!-- SMALL/BIG Spalte -->
						<div class="flex flex-col gap-10">
							<button
								type="button"
								onclick="small()"
								class="font-bold border-2 rounded-full w-fit px-16 mx-auto">
								SMALL
							</button>
							<button
								type="button"
								onclick="big()"
								class="font-bold border-2 rounded-full w-fit px-16 mx-auto">
								BIG
							</button>
						</div>
					</div>

					<!-- RESET (immer untereinander) -->
					<div class="mb-10">
						<button
							type="button"
							onclick="reset()"
							class="font-bold border-2 rounded-full w-fit px-18 mx-auto">
							!!RESET!!
						</button>
					</div>
				</div>
			</section>
		</main>

		<script src="script.js"></script>
	</body>
</html>
